workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # Android — signed AAB for Google Play
  # ─────────────────────────────────────────────────────────────────────────────
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      node: 22
      groups:
        - firebase                  # VITE_FIREBASE_* env vars
        - android_signing           # CM_KEYSTORE_BASE64, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
      vars:
        PACKAGE_NAME: com.medward.pro
        VITE_RELEASE_STAGE: production

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install Node deps
        script: npm ci

      - name: Build web assets
        script: npm run build

      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli

      - name: Sync Capacitor Android
        script: npx cap sync android

      - name: Set Android version
        script: |
          BUILD_NUMBER=$(($(git rev-list --count HEAD)))
          echo "Setting versionCode=$BUILD_NUMBER"
          sed -i "s/versionCode .*/versionCode $BUILD_NUMBER/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"1.0.$BUILD_NUMBER\"/" android/app/build.gradle

      - name: Generate keystore if not provided
        script: |
          if [ -z "$CM_KEYSTORE_BASE64" ]; then
            echo "⚠️  CM_KEYSTORE_BASE64 not set — generating a one-time keystore for this build."
            keytool -genkeypair \
              -alias medward \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -keystore /tmp/medward.keystore \
              -storepass "${CM_KEYSTORE_PASSWORD:-MedWard2024!}" \
              -keypass  "${CM_KEYSTORE_PASSWORD:-MedWard2024!}" \
              -dname "CN=MedWard, O=MedWard, L=Kuwait, C=KW"
            export CM_KEYSTORE_BASE64=$(base64 /tmp/medward.keystore)
            export CM_KEYSTORE_PASSWORD="${CM_KEYSTORE_PASSWORD:-MedWard2024!}"
            export CM_KEY_ALIAS="medward"
            echo "Save this as CM_KEYSTORE_BASE64 in Codemagic for future builds:"
            base64 /tmp/medward.keystore
          fi

      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
      - android/app/build/outputs/apk/release/app-release.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
      email:
        recipients:
          - balha@medward.pro
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────────
  # iOS — signed IPA for TestFlight
  # ─────────────────────────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22
      groups:
        - firebase                  # VITE_FIREBASE_* env vars
        - apple_credentials         # APP_STORE_CONNECT_PRIVATE_KEY
      vars:
        BUNDLE_ID: com.medward.pro
        APP_STORE_CONNECT_KEY_ID: 2NCWU63ZAC
        APP_STORE_CONNECT_ISSUER_ID: 5988b726-9289-48c6-ac37-4c603d29fa6a
        VITE_RELEASE_STAGE: production

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install Node deps
        script: npm ci

      - name: Build web assets
        script: npm run build

      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Set iOS build number
        script: |
          BUILD_NUMBER=$(($(git rev-list --count HEAD)))
          echo "Setting build number: $BUILD_NUMBER"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.$BUILD_NUMBER" ios/App/App/Info.plist

      - name: Fetch signing files
        script: |
          openssl genrsa -out /tmp/cert_key.pem 2048

          # Write key to file for xcodebuild (printf preserves newlines correctly)
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY \
            --certificate-key @file:/tmp/cert_key.pem \
            --create

          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          mkdir -p build/export

          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            DEVELOPMENT_TEAM="YPGU5K4U57" \
            clean archive

          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist /Users/builder/export_options.plist

    artifacts:
      - build/export/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
        beta_groups:
          - Internal Testers
      email:
        recipients:
          - balha@medward.pro
        notify:
          success: true
          failure: true
